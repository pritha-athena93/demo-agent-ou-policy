name: Policy-block agent responder

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  id-token: write   # required for AWS OIDC
  contents: read
  issues: write

jobs:
  decide:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - name: Gate on collaborator status, approval label, /run-agent comment, and injection pre-filter
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const trustedAssociations = ["OWNER", "MEMBER", "COLLABORATOR"];

            // Cheap, deterministic pre-filter for the obvious prompt-injection
            // patterns, mirrored from github_issue_agent.py's per-field
            // sanitizer. This is defense-in-depth, not the primary defense --
            // the real protections are the sanitizer/delimiters in the
            // mandate, the tool-input validation before dispatch, and the
            // broker/registry/guardrail enforcement around update_org_policy.
            // This check only decides whether to require an explicit
            // `approved-run` label (the one signal that means a human has
            // actually read the content) instead of auto-running, even for
            // an otherwise-trusted author/commenter -- a trusted account
            // pasting someone else's injected text in good faith is exactly
            // the case this is for.
            //
            // Scans parsed FIELD VALUES, not the raw issue body -- the raw
            // body legitimately contains "### <label>" headers from the
            // issue form itself, so matching a header pattern against it
            // directly would flag every single issue. Parse it the same way
            // github_issue_agent.py's parse_issue_form() does first.
            const injectionPatterns = [
              /\n\s*#{2,}/i,
              /\bassistant\s*:/i,
              /\bsystem\s*:/i,
              /\bignore\s+(the\s+)?(previous|above)\b/i,
              /\bnew\s+instructions?\b/i,
              /\byou\s+are\s+now\b/i,
              /\bact\s+as\b/i,
              /\bsystem\s+prompt\b/i,
            ];
            const issueBody = context.payload.issue.body || "";
            const fieldValues = issueBody.split(/^###\s+/m).slice(1).map((part) => {
              const newlineIndex = part.indexOf("\n");
              return newlineIndex === -1 ? "" : part.slice(newlineIndex + 1).trim();
            });
            const hasInjectionPattern = fieldValues.some((value) =>
              injectionPatterns.some((p) => p.test(value))
            );

            // issue_comment fires for both issues and PRs -- only handle issues.
            if (context.eventName === "issue_comment" && context.payload.issue.pull_request) {
              core.setOutput("should_run", "false");
              return;
            }

            const isTrustedIssueAuthor = trustedAssociations.includes(context.payload.issue.author_association);
            const isOpenedByTrusted = context.payload.action === "opened" && isTrustedIssueAuthor && !hasInjectionPattern;

            const isApprovalLabelAdded = context.payload.action === "labeled" &&
              context.payload.label && context.payload.label.name === "approved-run";

            // Round 2 of the two-round flow is just the requester's plain
            // reply to the agent's round-1 comment -- it doesn't carry a
            // /run-agent prefix, so any trusted, non-bot, non-injected
            // comment triggers a run now. github_issue_agent.py is what
            // decides whether that comment is actually round 2 (vs. round
            // 3+, which it refuses) by counting the bot's own past comments
            // -- this gate only decides "is this safe to run at all given
            // who's commenting," not which round it is.
            let isTriggerComment = false;
            if (context.eventName === "issue_comment" && context.payload.action === "created") {
              const comment = context.payload.comment;
              const isBot = comment.user.type === "Bot";
              const isTrustedCommenter = trustedAssociations.includes(comment.author_association);
              isTriggerComment = !isBot && isTrustedCommenter && !hasInjectionPattern;
            }

            const shouldRun = isOpenedByTrusted || isApprovalLabelAdded || isTriggerComment;
            core.setOutput("should_run", shouldRun ? "true" : "false");

            if (context.payload.action === "opened" && !isTrustedIssueAuthor) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: ["needs-maintainer-approval"],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: "Thanks for the report. This repo's agent only auto-runs for issues opened by maintainers/collaborators, since it makes real AWS calls. A maintainer can run it for you by adding the `approved-run` label, or commenting `/run-agent`.",
              });
            } else if (context.payload.action === "opened" && isTrustedIssueAuthor && hasInjectionPattern) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: ["needs-maintainer-approval"],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: "This issue's text matched patterns associated with prompt injection, so it won't auto-run even though you're a maintainer/collaborator -- please review the content, then add the `approved-run` label to run it anyway.",
              });
            }

            if (context.eventName === "issue_comment" && context.payload.action === "created" &&
                !context.payload.issue.pull_request) {
              const comment = context.payload.comment;
              const isTrustedCommenter = trustedAssociations.includes(comment.author_association);
              if (!isTrustedCommenter && comment.user.type !== "Bot") {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.issue.number,
                  body: "Replies only trigger the agent for maintainers/collaborators, since it makes real AWS calls.",
                });
              } else if (isTrustedCommenter && hasInjectionPattern) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.issue.number,
                  body: "This reply's text matched patterns associated with prompt injection, so it won't auto-run -- please review the content, then add the `approved-run` label to run it anyway.",
                });
              }
            }

  run-agent:
    needs: decide
    if: needs.decide.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -q boto3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Run agent against the issue
        id: run_agent
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEDROCK_GUARDRAIL_ID: ${{ vars.BEDROCK_GUARDRAIL_ID }}
          BEDROCK_GUARDRAIL_VERSION: ${{ vars.BEDROCK_GUARDRAIL_VERSION }}
          AGENT_MODEL_ID: ${{ vars.AGENT_MODEL_ID }}
        run: python github_issue_agent.py

      - name: Label HITL if the agent didn't reach a final answer
        if: steps.run_agent.outputs.needs_hitl == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ["HITL"],
            });

      - name: Post agent response as a comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("issue_comment.md", "utf8");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });
